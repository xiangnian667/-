<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>图标生成</title>
<style>
  body { margin:0; padding:0; background:#1a1a1a; font-family:monospace; color:#fff; }
  .row { display:flex; gap:20px; padding:20px; flex-wrap:wrap; }
  .item { text-align:center; }
  .item canvas { image-rendering:pixelated; image-rendering:crisp-edges; display:block; border:2px solid #444; background:#000; }
  button { margin-top:8px; padding:6px 12px; background:#444; color:#fff; border:1px solid #888; cursor:pointer; font-family:monospace; }
  button:hover { background:#666; }
  h2 { margin:0 0 8px; font-size:14px; color:#ccc; }
</style>
</head>
<body>
<div class="row" id="row"></div>
<script>
function drawIcon(size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  // 用低分辨率绘像素风，再放大
  const px = size / 32;
  ctx.imageSmoothingEnabled = false;

  // 背景渐变（深蓝紫 → 黑）
  const grad = ctx.createLinearGradient(0, 0, 0, size);
  grad.addColorStop(0, '#1a1a3e');
  grad.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);

  // 网格扫描线
  ctx.fillStyle = 'rgba(0,255,200,0.05)';
  for (let y = 0; y < 32; y += 2) ctx.fillRect(0, y*px, size, px);

  // 像素绘制函数
  const p = (x, y, color) => { ctx.fillStyle = color; ctx.fillRect(x*px, y*px, px, px); };
  const rect = (x, y, w, h, color) => { ctx.fillStyle = color; ctx.fillRect(x*px, y*px, w*px, h*px); };

  // 左边红色机甲 (P1)
  drawMecha(ctx, p, rect, 4, 8, '#ff3344', '#aa1122', '#ff8899', 'left');

  // 右边蓝色机甲 (P2)
  drawMecha(ctx, p, rect, 20, 8, '#3399ff', '#1144aa', '#88ccff', 'right');

  // 中间 VS 对撞火花
  drawVS(ctx, p, rect, 14, 12);

  // 边框装饰
  rect(0, 0, 32, 1, '#ff3344');
  rect(0, 31, 32, 1, '#3399ff');
  rect(0, 0, 1, 32, '#666');
  rect(31, 0, 1, 32, '#666');
}

function drawMecha(ctx, p, rect, x0, y0, main, dark, light, side) {
  // 头部
  rect(x0+4, y0+0, 4, 1, dark);
  rect(x0+3, y0+1, 6, 1, dark);
  rect(x0+2, y0+2, 8, 4, main);
  rect(x0+1, y0+3, 1, 2, dark);
  rect(x0+10, y0+3, 1, 2, dark);
  // 眼睛
  if (side === 'left') {
    rect(x0+4, y0+3, 2, 1, '#ffffff');
    rect(x0+7, y0+3, 2, 1, '#ffffff');
  } else {
    rect(x0+4, y0+3, 2, 1, '#ffffff');
    rect(x0+7, y0+3, 2, 1, '#ffffff');
  }
  // 嘴/通风口
  rect(x0+5, y0+5, 2, 1, dark);
  // 天线
  rect(x0+3, y0-1, 1, 1, main);
  rect(x0+8, y0-1, 1, 1, main);
  rect(x0+3, y0-2, 1, 1, light);
  rect(x0+8, y0-2, 1, 1, light);

  // 身体
  rect(x0+2, y0+6, 8, 1, dark);
  rect(x0+1, y0+7, 10, 5, main);
  rect(x0+2, y0+8, 8, 3, light);
  // 核心
  rect(x0+5, y0+9, 2, 2, '#ffff00');
  rect(x0+5, y0+9, 2, 1, '#ffffff');
  // 肩甲
  rect(x0+0, y0+7, 2, 3, dark);
  rect(x0+10, y0+7, 2, 3, dark);
  // 手臂
  rect(x0+0, y0+10, 2, 4, main);
  rect(x0+10, y0+10, 2, 4, main);
  // 拳头
  rect(x0-1, y0+13, 3, 2, dark);
  rect(x0+10, y0+13, 3, 2, dark);

  // 腿
  rect(x0+2, y0+12, 3, 6, main);
  rect(x0+7, y0+12, 3, 6, main);
  rect(x0+1, y0+18, 4, 2, dark);
  rect(x0+7, y0+18, 4, 2, dark);
}

function drawVS(ctx, p, rect, cx, cy) {
  // 火花放射
  const sparks = [
    [0,-3,'#ffff00'],[-1,-2,'#ffaa00'],[1,-2,'#ffaa00'],
    [0,3,'#ffff00'],[-1,2,'#ffaa00'],[1,2,'#ffaa00'],
    [-3,0,'#ffff00'],[-2,-1,'#ffaa00'],[-2,1,'#ffaa00'],
    [3,0,'#ffff00'],[2,-1,'#ffaa00'],[2,1,'#ffaa00'],
    [-2,-2,'#ff6600'],[2,-2,'#ff6600'],[-2,2,'#ff6600'],[2,2,'#ff6600']
  ];
  sparks.forEach(([dx,dy,c]) => rect(cx+1+dx, cy+1+dy, 1, 1, c));
  // VS 文字简化（像素点）
  rect(cx, cy+1, 1, 3, '#ffffff');
}

const row = document.getElementById('row');
const sizes = [
  { name: '192x192 (xxxhdpi)', size: 192 },
  { name: '144x144 (xxhdpi)', size: 144 },
  { name: '96x96 (xhdpi)', size: 96 },
  { name: '72x72 (hdpi)', size: 72 },
  { name: '48x48 (mdpi)', size: 48 },
];

sizes.forEach(({name, size}) => {
  const div = document.createElement('div');
  div.className = 'item';
  const c = document.createElement('canvas');
  c.width = c.height = size;
  drawIconOnCanvas(c, size);
  const h = document.createElement('h2');
  h.textContent = name;
  const btn = document.createElement('button');
  btn.textContent = '下载 PNG';
  btn.onclick = () => {
    const link = document.createElement('a');
    link.download = `ic_launcher_${size}.png`;
    link.href = c.toDataURL('image/png');
    link.click();
  };
  div.appendChild(h);
  div.appendChild(c);
  div.appendChild(btn);
  row.appendChild(div);
});

function drawIconOnCanvas(c, size) {
  const ctx = c.getContext('2d');
  const px = size / 32;
  ctx.imageSmoothingEnabled = false;
  const grad = ctx.createLinearGradient(0, 0, 0, size);
  grad.addColorStop(0, '#1a1a3e');
  grad.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);
  ctx.fillStyle = 'rgba(0,255,200,0.05)';
  for (let y = 0; y < 32; y += 2) ctx.fillRect(0, y*px, size, px);
  const p = (x, y, color) => { ctx.fillStyle = color; ctx.fillRect(x*px, y*px, px, px); };
  const rect = (x, y, w, h, color) => { ctx.fillStyle = color; ctx.fillRect(x*px, y*px, w*px, h*px); };
  drawMecha(ctx, p, rect, 4, 8, '#ff3344', '#aa1122', '#ff8899', 'left');
  drawMecha(ctx, p, rect, 20, 8, '#3399ff', '#1144aa', '#88ccff', 'right');
  drawVS(ctx, p, rect, 14, 12);
  rect(0, 0, 32, 1, '#ff3344');
  rect(0, 31, 32, 1, '#3399ff');
  rect(0, 0, 1, 32, '#666');
  rect(31, 0, 1, 32, '#666');
}
</script>
</body>
</html>
